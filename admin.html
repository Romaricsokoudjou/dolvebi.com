<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Dolvebi - Romaric Sokoudjou</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #eef2f3; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 12px; max-width: 450px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 90%; margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 95%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        textarea { width: 90%; margin-top: 15px; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
        #admin-section { border-top: 4px solid #28a745; }
    </style>
</head>
<body>

<div class="box" id="login-section">
    <h2>Connexion Admin Dolvebi</h2>
    <p>Réservé à <strong>Romaric Sokoudjou</strong></p>
    <input type="email" id="email" placeholder="Email (créé dans Firebase)">
    <input type="password" id="password" placeholder="Mot de passe">
    <button id="login-btn">Entrer dans le bureau</button>
</div>

<div class="box" id="admin-section" style="display:none;">
    <h2>Bienvenue, Romaric Sokoudjou</h2>
    <p>Votre interface de gestion est prête.</p>
    <textarea id="news" placeholder="Écrire une annonce ou modifier un produit..." rows="5"></textarea>
    <button id="publish-btn" style="background: #28a745;">Publier les modifications</button>
    <br><br>
    <button id="logout-btn" style="background: #dc3545; font-size: 12px;">Se déconnecter</button>
</div>

<script type="module">
  // On utilise les versions stables de Firebase via CDN
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // Configuration EXACTE de votre projet Dolvebi
  const firebaseConfig = {
    apiKey: "AIzaSyDkwWEG9eBcb6NeoK-M-wFyWJ3rSp2LAeI",
    authDomain: "admin-dolvebi.firebaseapp.com",
    projectId: "admin-dolvebi",
    storageBucket: "admin-dolvebi.firebasestorage.app",
    messagingSenderId: "953429615835",
    appId: "1:953429615835:web:fc9f1ca835a2060123d8fe",
    measurementId: "G-DZTJJ4BPDP"
  };

  // Initialisation
  const app = initializeApp(firebaseConfig);
  const auth = getAuth();

  // Fonction de connexion
  document.getElementById('login-btn').onclick = () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;

    signInWithEmailAndPassword(auth, email, pass)
      .then((userCredential) => {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-section').style.display = 'block';
      })
      .catch((error) => {
        // Message d'erreur plus clair en français
        let message = "Erreur de connexion";
        if (error.code === 'auth/invalid-credential') message = "Email ou mot de passe incorrect.";
        if (error.code === 'auth/api-key-not-valid') message = "La clé API est refusée. Vérifiez que 'localhost' est autorisé dans la console Firebase.";
        
        alert("Accès refusé : " + message);
        console.error(error.code);
      });
  };

  // Bouton déconnexion
  document.getElementById('logout-btn').onclick = () => {
    signOut(auth).then(() => {
        location.reload();
    });
  };
</script>

</body>
</html>
